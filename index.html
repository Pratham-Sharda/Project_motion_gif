<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Gallery</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; padding: 40px; text-align: center; }
        .container { max-width: 1200px; margin: auto; }
        .section-title { font-size: 2rem; margin-top: 40px; border-bottom: 2px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
        .gif-card { background: #1e1e1e; padding: 15px; border-radius: 12px; transition: transform 0.3s ease; }
        .gif-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        img { width: 100%; height: auto; border-radius: 8px; display: block; }
        .label { margin-top: 12px; font-size: 0.9rem; color: #bbb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Visual Assets Gallery</h1>

        <div class="section-title">Yachts</div>
        <div class="gallery" id="yatch-grid"></div>

        <div class="section-title">Cats</div>
        <div class="gallery" id="cat-grid"></div>

        <div class="section-title">Lions</div>
        <div class="gallery" id="lion-grid"></div>
    </div>

    <script>
        const groups = ['yatch', 'cat', 'lion'];
        
        groups.forEach(group => {
            const grid = document.getElementById(`${group}-grid`);
            let htmlContent = '';

            // Loop for Normal 1-3
            for (let i = 1; i <= 50; i++) {
                const fileName = `${group}_${i}.gif`;
                htmlContent += `
                    <div class="gif-card">
                        <img src="${fileName}" alt="${fileName}" onerror="this.parentElement.style.display='none'">
                        <div class="label">${fileName}</div>
                    </div>`;
            }

            // Loop for BG 1-3
            for (let i = 1; i <= 50; i++) {
                const fileName = `${group}_bg_${i}.gif`;
                htmlContent += `
                    <div class="gif-card">
                        <img src="${fileName}" alt="${fileName}" onerror="this.parentElement.style.display='none'">
                        <div class="label">${fileName}</div>
                    </div>`;
            }

            grid.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
